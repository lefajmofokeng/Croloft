<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exchange Login</title>
   <style>
        @font-face { font-family:'Circular Std'; src:url('fonts/CircularStd-Book.woff2') format('woff2'),url('fonts/CircularStd-Book.woff') format('woff'); font-weight:400; font-style:normal; font-display:swap; }
        @font-face { font-family:'Circular Std'; src:url('fonts/CircularStd-BookItalic.woff2') format('woff2'),url('fonts/CircularStd-BookItalic.woff') format('woff'); font-weight:400; font-style:italic; font-display:swap; }
        @font-face { font-family:'Circular Std'; src:url('fonts/CircularStd-Medium.woff2') format('woff2'),url('fonts/CircularStd-Medium.woff') format('woff'); font-weight:500; font-style:normal; font-display:swap; }
        @font-face { font-family:'Circular Std'; src:url('fonts/CircularStd-Bold.woff2') format('woff2'),url('fonts/CircularStd-Bold.woff') format('woff'); font-weight:600; font-style:normal; font-display:swap; }
        @font-face { font-family:'Circular Std'; src:url('fonts/CircularStd-Black.woff2') format('woff2'),url('fonts/CircularStd-Black.woff') format('woff'); font-weight:800; font-style:normal; font-display:swap; }
    </style>
  <style>
    /* Prefix: cr-ex-
       Font: Prioritizes Circular Std, then common system fallbacks.
       Note: For Circular Std to render, it must be installed locally 
       or loaded in your head via <link> or @font-face.
    */

    /* --- Base Scope styles applied to a unique scoped element --- */
    #cr-ex-app-scope {
      font-family: 'Circular Std', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #111114; /* Deep black-gray match */
      color: #ffffff;
      min-height: 80vh;
      width: 100%;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    * {
        padding: 0;
        margin: 0;
    }

    #cr-ex-app-scope * {
      box-sizing: border-box;
    }

    #cr-ex-app-scope a {
      color: #1199fa;
      text-decoration: none;
      transition: color 0.15s;
    }

    #cr-ex-app-scope a:hover {
      color: #38bdf8;
    }

    /* --- Header --- */
    .cr-ex-header {
      height: 55px;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #222226;
    }

    .cr-ex-header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cr-ex-logo-icon {
      width: 24px;
      height: 24px;
      color: #ffffff;
    }

    .cr-ex-header-title {
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .cr-ex-header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .cr-ex-icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #8b949e;
      padding: 8px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .cr-ex-icon-btn:hover {
      color: #ffffff;
    }

    /* --- Main content and Login Card --- */
    .cr-ex-main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .cr-ex-login-card {
      background-color: transparent; /* Card background match */
      border: 1px solid #303034;
      border-radius: 6px;
      width: 100%;
      max-width: 480px;
      padding: 40px;
    }

    .cr-ex-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .cr-ex-card-title {
      font-size: 24px;
      font-weight: 500;
      margin: 0;
    }

    .cr-ex-qr-icon {
      width: 24px;
      height: 24px;
      color: #8b949e;
    }

    /* --- Form Elements --- */
    .cr-ex-form-group {
      margin-bottom: 24px;
    }

    .cr-ex-input-label {
      display: block;
      color: #8b949e;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .cr-ex-input {
      width: 100%;
      background-color: #111114;
      border: 1px solid #222226;
      border-radius: 4px;
      padding: 12px 16px;
      color: #ffffff;
      font-size: 16px;
      font-family: inherit;
    }

    .cr-ex-input:focus {
      outline: none;
      border-color: #1199fa;
    }

    .cr-ex-input::placeholder {
      color: #5c6370;
    }

    /* --- Buttons --- */
    .cr-ex-btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background-color 0.15s, border-color 0.15s;
      font-family: inherit;
    }

    .cr-ex-btn-primary {
      background-color: #73b0db; /* Primary blue match */
      color: #202020;
    }

    .cr-ex-btn-primary:hover {
      background-color: #38bdf8;
    }

    .cr-ex-btn-secondary {
      background-color: #222226; /* Secondary button match */
      color: #ffffff;
    }

    .cr-ex-btn-secondary:hover {
      background-color: #303036;
    }

    /* --- Separator and Social --- */
    .cr-ex-or-separator {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: #5c6370;
    }

    .cr-ex-or-line {
      flex: 1;
      height: 1px;
      background-color: #222226;
    }

    .cr-ex-or-text {
      padding: 0 16px;
      font-size: 12px;
      font-weight: 500;
    }

    .cr-ex-social-btn-group {
      margin-bottom: 24px;
    }

    .cr-ex-social-btn-group .cr-ex-btn {
      margin-bottom: 12px;
    }

    .cr-ex-social-btn-group .cr-ex-btn:last-child {
      margin-bottom: 0;
    }

    .cr-ex-social-icon {
      width: 18px;
      height: 18px;
    }

    /* --- Card Footer --- */
    .cr-ex-keep-logged {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      cursor: pointer;
      user-select: none;
    }

    .cr-ex-checkbox-custom {
      width: 18px;
      height: 18px;
      border: 1px solid #5c6370;
      border-radius: 2px;
      background-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* This rule styles the custom check box when the real check box is checked */
    .cr-ex-checkbox-input:checked + .cr-ex-checkbox-custom {
      background-color: #1199fa;
      border-color: #1199fa;
    }

    .cr-ex-checkbox-input:checked + .cr-ex-checkbox-custom::after {
      content: '✓';
      color: white;
      font-size: 14px;
    }

    .cr-ex-checkbox-text {
      font-size: 14px;
      color: #ffffff;
    }

    /* Hide the real checkbox but keep accessible */
    .cr-ex-checkbox-input {
      position: absolute;
      opacity: 0;
      cursor: pointer;
      height: 0;
      width: 0;
    }

    .cr-ex-create-account {
      text-align: left;
      font-size: 14px;
      color: #8b949e;
    }

    /* --- Footer --- */
    .cr-ex-footer {
      height: 56px;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid #222226;
      font-size: 12px;
      color: #5c6370;
    }

    .cr-ex-footer-copyright {
      color: #5c6370;
    }

    .cr-ex-footer-links {
      display: flex;
      gap: 24px;
    }

    .cr-ex-footer-link {
      color: #5c6370;
    }

    .cr-ex-footer-link:hover {
      color: #ffffff;
    }

    /* Responsive adjustments */
    @media (max-width: 600px) {
      .cr-ex-header, .cr-ex-footer { padding: 0 20px; }
      .cr-ex-login-card { padding: 30px 20px; }
      .cr-ex-create-account { text-align: center; }
    }
  </style>
</head>
<div id="cr-ex-app-scope">
  <div class="cr-ex-header">
    <div class="cr-ex-header-logo">
      <svg class="cr-ex-logo-icon" viewBox="0 0 100 100" fill="currentColor">
        <path d="M50,0 C22.4,0 0,22.4 0,50 C0,77.6 22.4,100 50,100 C77.6,100 100,77.6 100,50 C100,22.4 77.6,0 50,0 Z M50,85 C30.7,85 15,69.3 15,50 C15,30.7 30.7,15 50,15 C69.3,15 85,30.7 85,50 C85,69.3 69.3,85 50,85 Z" />
        <path d="M50,25 C36.2,25 25,36.2 25,50 C25,63.8 36.2,75 50,75 C63.8,75 75,63.8 75,50 C75,36.2 63.8,25 50,25 Z M50,65 C41.7,65 35,58.3 35,50 C35,41.7 41.7,35 50,35 C58.3,35 65,41.7 65,50 C65,58.3 58.3,65 50,65 Z" />
      </svg>
      <span class="cr-ex-header-title">EXCHANGE</span>
    </div>
    <div class="cr-ex-header-actions">
      <button class="cr-ex-icon-btn" aria-label="Language selection">
        <svg class="cr-ex-icon-btn-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="2" y1="12" x2="22" y2="12"></line>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </svg>
      </button>
    </div>
  </div>

  <div class="cr-ex-main-content">
    <div class="cr-ex-login-card">
      <div class="cr-ex-card-header">
        <h1 class="cr-ex-card-title">Log in</h1>
      </div>

      <div class="cr-ex-form-group">
        <label class="cr-ex-input-label" for="cr-ex-email">Email</label>
        <input type="email" id="cr-ex-email" class="cr-ex-input" placeholder="Enter your email address">
      </div>

      <button class="cr-ex-btn cr-ex-btn-primary">Continue</button>

      <div class="cr-ex-or-separator">
        <div class="cr-ex-or-line"></div>
        <span class="cr-ex-or-text">OR</span>
        <div class="cr-ex-or-line"></div>
      </div>

      <div class="cr-ex-social-btn-group">
        <button class="cr-ex-btn cr-ex-btn-secondary">
          <svg class="cr-ex-social-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12.427 4.542c-2.42 0-4.382 1.961-4.382 4.382c0 .35.04.69.117 1.015L4 14.161V17h6v2h1v2h2v2h1v-1.161l.161-.161l1.666 1.666a4.382 4.382 0 1 0-.411-2.344zm.135 12.016a2.036 2.036 0 1 1 2.036-2.036 2.036 2.036 0 0 1-2.036 2.036z"></path>
          </svg>
          Continue with Passkey
        </button>
        <button class="cr-ex-btn cr-ex-btn-secondary">
          <svg class="cr-ex-social-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"></path>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"></path>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"></path>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"></path>
          </svg>
          Continue with Google
        </button>
        <button class="cr-ex-btn cr-ex-btn-secondary">
          <svg class="cr-ex-social-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.05 20.28c-.98.95-2.05 1.78-3.72 1.78-1.54 0-2.03-.94-3.71-.94s-2.17.94-3.71.94c-1.68 0-2.74-.83-3.72-1.78C.68 18.06-1.54 13.91-1.54 10.36c0-3.5 1.78-6.17 4.67-6.17 1.45 0 2.27.7 3.39.7 1.12 0 1.94-.7 3.39-.7 2.89 0 4.67 2.67 4.67 6.17a11.02 11.02 0 0 1-1.5 6.02v.03z"></path>
            <path d="M11.96.94a4.01 4.01 0 0 0 .93 3.03a4.01 4.01 0 0 0 3.02-.93a4.01 4.01 0 0 0-.93-3.03a4.01 4.01 0 0 0-3.02.93z"></path>
          </svg>
          Continue with Apple
        </button>
      </div>

      <div class="cr-ex-card-footer">
        <label class="cr-ex-keep-logged">
          <input type="checkbox" class="cr-ex-checkbox-input">
          <div class="cr-ex-checkbox-custom"></div>
          <span class="cr-ex-checkbox-text">Keep me logged in</span>
        </label>
        <p class="cr-ex-create-account">Don't have an account? <a href="#">Create an account</a></p>
      </div>
    </div>
  </div>

  <div class="cr-ex-footer">
    <div class="cr-ex-footer-copyright">
      Copyright © 2018 - 2026 Crypto.com. All rights reserved.
    </div>
    <div class="cr-ex-footer-links">
      <a href="#" class="cr-ex-footer-link">Privacy Notice</a>
      <a href="#" class="cr-ex-footer-link">Status</a>
      <a href="#" class="cr-ex-footer-link">Cookie Preferences</a>
    </div>
  </div>
</div>
</html>
