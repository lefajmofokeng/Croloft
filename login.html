

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Fey</title>
    <style>
        @font-face { font-family:'Circular Std'; src:url('fonts/CircularStd-Book.woff2') format('woff2'),url('fonts/CircularStd-Book.woff') format('woff'); font-weight:400; font-style:normal; font-display:swap; }
        @font-face { font-family:'Circular Std'; src:url('fonts/CircularStd-BookItalic.woff2') format('woff2'),url('fonts/CircularStd-BookItalic.woff') format('woff'); font-weight:400; font-style:italic; font-display:swap; }
        @font-face { font-family:'Circular Std'; src:url('fonts/CircularStd-Medium.woff2') format('woff2'),url('fonts/CircularStd-Medium.woff') format('woff'); font-weight:500; font-style:normal; font-display:swap; }
        @font-face { font-family:'Circular Std'; src:url('fonts/CircularStd-Bold.woff2') format('woff2'),url('fonts/CircularStd-Bold.woff') format('woff'); font-weight:600; font-style:normal; font-display:swap; }
        @font-face { font-family:'Circular Std'; src:url('fonts/CircularStd-Black.woff2') format('woff2'),url('fonts/CircularStd-Black.woff') format('woff'); font-weight:800; font-style:normal; font-display:swap; }
    </style>

</head>

<div id="fey-auth-wrapper" class="fey-auth-wrapper">
    <!-- Scoped Styles -->
    <style>
        .fey-auth-wrapper * {
            box-sizing: border-box;
            font-family: 'Circular Std', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        .fey-auth-wrapper {
            min-height: 100vh;
            width: 100%;
            background-color: #080d1b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            color: #ffffff;
        }

        /* Subtle Background Glow */
        .fey-auth-wrapper::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 400px;
            background: radial-gradient(circle, rgba(100, 144, 255, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
        }

        /* Close Button */
        .fey-close-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }

        .fey-close-btn svg {
            width: 12px;
            height: 12px;
            stroke: #888;
        }

        /* Main Card */
        .fey-auth-content {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .fey-auth-content h1 {
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .fey-auth-content h1 span {
            color: #d1d1d1;
        }

        .fey-auth-content p {
            font-size: 14px;
            color: #888;
            line-height: 1.5;
            margin-bottom: 32px;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Input Styling */
        .fey-input-container {
            position: relative;
            margin-bottom: 24px;
            width: 100%;
        }

        .fey-email-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 100px;
            padding: 14px 50px 14px 24px;
            color: #fff;
            font-size: 15px;
            outline: none; font-weight: 400;
            transition: border-color 0.2s, background 0.2s;
        }

        .fey-email-input:focus {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
        }

        .fey-email-input::placeholder {
            color: #555;
        }

        .fey-submit-arrow {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #888;
        }

        .fey-submit-arrow:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        /* Microsoft Login Button */
        .fey-microsoft-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            width: 100%;
            padding: 12px;
            
        }

        .fey-microsoft-btn img {
            width: 18px;
            height: 18px;
        }

        /* Footer */
        .fey-auth-footer {
            position: absolute;
            bottom: 40px;
            font-size: 13px;
            color: #888;
            z-index: 2;
        }

        .fey-auth-footer span {
            color: #fff;
            font-weight: 500;
            cursor: pointer;
            margin-left: 4px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .fey-auth-content h1 { font-size: 24px; }
            .fey-auth-content p { font-size: 13px; }
            .fey-auth-wrapper::before { width: 300px; height: 300px; }
        }
    </style>

    <!-- Content -->
    <a href="index.html" class="fey-close-btn" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </a>

    <div class="fey-auth-content">
        <h1>Login to <span>Croloft</span></h1>
        <p>If you gained access to Croloft, you can enter your email or login with your Google account.</p>

        <form>
            <div class="fey-input-container">
                <input type="email" class="fey-email-input" placeholder="Account email" required>
                <button type="submit" class="fey-submit-arrow">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </div>
        </form>

        <button class="fey-microsoft-btn">
            <svg height="25" width="25" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Sign in with Google
        </button>
    </div>

    <div class="fey-auth-footer">
        Don't have an account yet? <span>Sign up.</span>
    </div>
</div>
</html>
